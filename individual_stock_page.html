<!DOCTYPE html>
<html>
<head>
    <title>Sample IHICY Stock Page</title>
</head>
<body>
    <div class="zr_rankbox composite_group">
        <p class="rank_title">Zacks Style Scores</p>
        <p class="rank_view">
            <span class="composite_val">A</span>&nbsp;Value
            <span class="composite_val">B</span>&nbsp;Growth
            <span class="composite_val">C</span>&nbsp;Momentum
            <span class="composite_val composite_val_vgm">A</span>&nbsp;VGM
        </p>
        <p class="rank_disclosure">
            Some disclosure text here.
        </p>
    </div>

    <div class="zr_rankbox some_other_group">
        <p class="rank_title">Other Scores</p>
        <p class="rank_view">
            <span class="composite_val">D</span>&nbsp;Quality
            <span class="composite_val">F</span>&nbsp;Balance
        </p>
    </div>
</body>
</html>
